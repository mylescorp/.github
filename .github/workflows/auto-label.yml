name: Auto Label PRs and Issues

on:
  pull_request:
    types: [opened, edited, synchronize]
  issues:
    types: [opened, edited]

jobs:
  label:
    name: Auto Label
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write

    steps:
      - name: Label PR by branch name
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const branch = context.payload.pull_request.head.ref;
            const labels = [];

            if (branch.startsWith('feature/')) labels.push('enhancement');
            if (branch.startsWith('fix/')) labels.push('bug');
            if (branch.startsWith('hotfix/')) labels.push('hotfix', 'priority: critical');
            if (branch.startsWith('docs/')) labels.push('documentation');
            if (branch.startsWith('chore/')) labels.push('chore');
            if (branch.startsWith('perf/')) labels.push('performance');

            if (labels.length > 0) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.pull_request.number,
                labels: labels
              });
            }

      - name: Label issue by title
        if: github.event_name == 'issues'
        uses: actions/github-script@v7
        with:
          script: |
            const title = context.payload.issue.title.toLowerCase();
            const labels = [];

            if (title.startsWith('[bug]')) labels.push('bug');
            if (title.startsWith('[feature]')) labels.push('enhancement');
            if (title.startsWith('[feedback]')) labels.push('feedback');
            if (title.includes('security')) labels.push('security');
            if (title.includes('performance')) labels.push('performance');

            if (labels.length > 0) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.issue.number,
                labels: labels
              });
            }
